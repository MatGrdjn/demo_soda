services:
  airflow:
    build: .
    container_name: airflow_demo
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://admin:admin@postgres:5432/airflow_db
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW__CORE__FERNET_KEY=YWJjZGVmZ2hpamtsbW5vcHFyc3R1dnd4eXpBQkNERUY=
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - NEWSDATA_API_KEY=${NEWSDATA_API_KEY}
      - TELEGRAM_TOKEN=${TELEGRAM_TOKEN}
      - CHAT_ID=${CHAT_ID}
    volumes:
      - ./dags:/opt/airflow/dags
      - ./configuration.yml:/opt/airflow/configuration.yml
      - ./checks_crypto.yml:/opt/airflow/checks_crypto.yml
      - ./checks_news.yml:/opt/airflow/checks_news.yml
      - ./checks_ai.yml:/opt/airflow/checks_ai.yml
    ports:
      - "8080:8080"
    command: standalone
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:13
    container_name: postgres_db
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=admin
      - POSTGRES_DB=airflow_db
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d airflow_db"]
      interval: 5s
      timeout: 5s
      retries: 5